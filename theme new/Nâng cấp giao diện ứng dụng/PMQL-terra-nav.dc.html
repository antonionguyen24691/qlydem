<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: "Instrument Sans", ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
</style>
</helmet>
<header style="display:flex;height:60px;box-sizing:border-box;align-items:center;gap:24px;padding:0 28px;border-bottom:1px solid #EBE2D8;background:#FBF7F2;color:#2B2420;">
  <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
    <div style="display:flex;height:30px;width:30px;align-items:center;justify-content:center;border-radius:8px;background:#AE4F26;color:#FFFFFF;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;">P</div>
    <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;letter-spacing:-0.01em;">PMQL</span>
  </div>
  <nav style="display:flex;align-items:center;gap:4px;flex:1;">
    <button style="{{ stDashboard }}" style-hover="background:#F2EAE0;">Tổng quan</button>
    <button style="{{ stPos }}" style-hover="background:#F2EAE0;">Bán hàng</button>
    <button style="{{ stOrders }}" style-hover="background:#F2EAE0;">Đơn hàng</button>
    <button style="{{ stInventory }}" style-hover="background:#F2EAE0;">Kho</button>
    <button style="{{ stCustomers }}" style-hover="background:#F2EAE0;">Khách hàng</button>
    <button style="{{ stFinance }}" style-hover="background:#F2EAE0;">Tài chính</button>
  </nav>
  <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
    <div style="position:relative;">
      <div style="position:absolute;top:0;bottom:0;left:0;display:flex;align-items:center;padding-left:12px;pointer-events:none;color:#B3A79D;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-4.34-4.34"></path><circle cx="11" cy="11" r="8"></circle></svg>
      </div>
      <input type="text" placeholder="Tìm kiếm" style="width:190px;box-sizing:border-box;border-radius:9999px;border:1px solid #EBE2D8;padding:8px 14px 8px 34px;font-size:13px;color:#2B2420;background:#FFFFFF;font-family:inherit;">
    </div>
    <button style="position:relative;display:flex;padding:8px;color:#7A6A5D;background:transparent;border:none;border-radius:9999px;cursor:pointer;" style-hover="background:#F2EAE0;">
      <span style="position:absolute;top:2px;right:2px;height:8px;width:8px;border-radius:9999px;background:#AE4F26;border:2px solid #FBF7F2;"></span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.268 21a2 2 0 0 0 3.464 0"></path><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"></path></svg>
    </button>
    <div style="display:flex;height:32px;width:32px;align-items:center;justify-content:center;border-radius:9999px;background:#2B2420;color:#FBF7F2;font-weight:700;font-size:13px;cursor:pointer;">C</div>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:60},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;orders&quot;,&quot;options&quot;:[&quot;dashboard&quot;,&quot;pos&quot;,&quot;orders&quot;,&quot;products&quot;,&quot;inventory&quot;,&quot;customers&quot;,&quot;suppliers&quot;,&quot;finance&quot;,&quot;expenses&quot;,&quot;settings&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  navStyle(active) {
    return {
      border: "none", padding: "8px 14px", borderRadius: "9999px",
      fontSize: "14px", fontFamily: "inherit", cursor: "pointer",
      fontWeight: active ? 700 : 500,
      color: active ? "#FFFFFF" : "#7A6A5D",
      background: active ? "#AE4F26" : "transparent"
    };
  }
  renderVals() {
    const raw = this.props.active ?? "dashboard";
    const map = { products: "inventory", suppliers: "customers", expenses: "finance", orders: "orders" };
    const a = map[raw] ?? raw;
    const st = (k) => this.navStyle(a === k);
    return {
      stDashboard: st("dashboard"), stPos: st("pos"), stOrders: st("orders"),
      stInventory: st("inventory"), stCustomers: st("customers"), stFinance: st("finance")
    };
  }
}
</script>
</body>
</html>
